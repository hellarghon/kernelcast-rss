name: Publish to Telegram
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install feedparser requests
      - name: Ejecutar script de Telegram (artículos)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_publisher.py
      - name: Ejecutar script de Telegram (podcast)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_podcast_publisher.py
      - name: Guardar estado de publicados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add telegram_published.json telegram_podcast_published.json
          git diff --staged --quiet || git commit -m "Update telegram published state"
          git push
